name: Build and Upload to App Store Connect

on:
  workflow_dispatch:  # Manual trigger from GitHub UI

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Create App Store Connect API key file
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          KEY_FILE=~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8
          echo "$APPSTORE_API_KEY" > "$KEY_FILE"
          echo "Key file size: $(wc -c < "$KEY_FILE") bytes"
          head -1 "$KEY_FILE"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project "Tennis Scorer/Tennis Scorer.xcodeproj" \
            -scheme "Tennis Scorer" \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/TennisScorer.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=DNS7GY854U \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }}

      - name: Create export options
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>DNS7GY854U</string>
          </dict>
          </plist>
          PLIST

      - name: Export and upload
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/TennisScorer.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }}
