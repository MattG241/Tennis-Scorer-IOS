name: Build and Upload to App Store Connect

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications | grep Xcode

      - name: Select Xcode
        run: |
          # Try Xcode 16.1 first (better runtime compatibility), fall back to 16.0, then 16.2
          if [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          else
            echo "Available Xcode versions:"
            ls /Applications | grep Xcode
            echo "Using default"
          fi

      - name: Show Xcode version and SDKs
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i watch
          xcrun simctl list runtimes | grep -i watch || true

      - name: Create App Store Connect API key file
        env:
          APPSTORE_API_KEY: ${{ secrets.APPSTORE_API_KEY }}
        run: |
          mkdir -p ~/private_keys
          KEY_FILE=~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8
          echo "$APPSTORE_API_KEY" > "$KEY_FILE"
          echo "Key file size: $(wc -c < "$KEY_FILE") bytes"
          head -1 "$KEY_FILE"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project "Tennis Scorer/Tennis Scorer.xcodeproj" \
            -scheme "Tennis Scorer" \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/TennisScorer.xcarchive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=DNS7GY854U \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }}

      - name: Export and upload
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>DNS7GY854U</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/TennisScorer.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPSTORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPSTORE_API_ISSUER_ID }}
